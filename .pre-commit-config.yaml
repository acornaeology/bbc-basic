repos:
  - repo: local
    hooks:
      - id: readme-update
        name: Regenerate README.md
        entry: bash -c 'uv run generate_readme.py && git add README.md'
        language: system
        files: '(README\.md\.j2|generate_readme\.py|acornaeology\.json|rom\.json)$'
        pass_filenames: false
